name:  Secrets Demo
on: [push]

jobs:
  use-secret:
    runs-on:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print Secret
        env:
          MY_SECRET_VAL: ${{ secrets.MY_SECRET }}
        run: |
          echo "Printing secret directly (masked): ${{ secrets.MY_SECRET }}"
          echo "Printinf secret from env (masked): $MY_SECRET_VAL"